<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kineos - Gestão de Estúdios</title>
    <style>
        body { background: #fdfbf7; color: #008080; font-family: 'Inter', sans-serif; display: flex; height: 100vh; align-items: center; justify-content: center; margin: 0; text-align: center; }
        .container { max-width: 600px; padding: 20px; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #4a4a4a; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #008080; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kineos</h1>
        <p>Estamos preparando uma gestão simples e fluida para o seu estúdio.</p>
        <div class="loader"></div>
        <p><strong>Lançamento em breve!</strong></p>
    </div>
</body>
</html>
